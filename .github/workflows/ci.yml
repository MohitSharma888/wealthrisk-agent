name: tests
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest langchain langgraph langchain-anthropic anthropic neo4j python-dotenv pandas
      - run: pytest tests/ -v
